<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 EVCS Demo - Sistema de Notificaciones Electromovilidad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1400px;
            width: 100%;
        }
        .phone-simulator {
            width: 100%;
            max-width: 500px;
            height: 800px;
            background: #000;
            border-radius: 40px;
            border: 12px solid #000;
            box-shadow: 0 0 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .phone-notch {
            background: #000;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 12px;
        }
        .phone-screen {
            flex: 1;
            background: #fff;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: 600;
        }
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }
        .tab-bar {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #eee;
            background: #fafafa;
        }
        .tab-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-top: 3px solid transparent;
            font-size: 12px;
            color: #999;
            transition: all 0.3s;
        }
        .tab-item.active {
            border-top-color: #667eea;
            color: #667eea;
            font-weight: 600;
        }
        .input-field { margin-bottom: 15px; display: flex; flex-direction: column; }
        .input-field label { font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }
        .input-field input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-danger { background: #ff6b6b; color: white; }
        .session-card {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        .session-header { font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #333; }
        .session-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .session-metric {
            background: white;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }
        .session-metric-value { font-weight: 600; font-size: 16px; color: #667eea; }
        .session-metric-label { font-size: 11px; color: #999; }
        .notification-item {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            cursor: pointer;
        }
        .notification-item:hover { background: #f0f0f0; }
        .notification-time { font-size: 11px; color: #999; margin-bottom: 5px; }
        .notification-title { font-weight: 600; font-size: 13px; color: #333; margin-bottom: 3px; }
        .notification-body { font-size: 12px; color: #666; }
        .control-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: fit-content;
        }
        .control-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #333; }
        .control-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .control-section:last-child { border-bottom: none; }
        .section-label { font-size: 12px; font-weight: 600; color: #667eea; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .control-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .control-btn-success { background: #51cf66; color: white; }
        .control-btn-success:hover { background: #40c057; transform: translateY(-2px); }
        .control-btn-warning { background: #ffa94d; color: white; }
        .control-btn-warning:hover { background: #ff922b; transform: translateY(-2px); }
        .control-btn-danger { background: #ff6b6b; color: white; }
        .control-btn-danger:hover { background: #fa5252; transform: translateY(-2px); }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 10px; }
        .status-success { background: #d3f9d8; color: #2f9e44; }
        .status-error { background: #ffe0e0; color: #c92a2a; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .ocpp-event {
            background: #f0f9ff;
            border-left: 4px solid #3b82f6;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 11px;
            font-family: monospace;
            color: #333;
        }
        .ocpp-event .event-type { font-weight: 600; color: #1e40af; }
        @media (max-width: 1200px) {
            .container { grid-template-columns: 1fr; }
            .phone-simulator { max-width: 100%; height: 600px; }
            .control-panel { height: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- PHONE SIMULATOR -->
        <div class="phone-simulator">
            <div class="phone-notch"><span>🔋 📶</span></div>
            <div class="phone-screen">
                <div class="app-header"><span>EVCS Notificaciones</span></div>
                <div class="app-content">
                    <div id="screen-login" class="screen active">
                        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                            <div style="text-align:center; margin-bottom:30px;">
                                <div style="font-size:48px;">⚡</div>
                                <h1 style="font-size:20px;">EVCS</h1>
                                <p style="color:#999; font-size:12px;">Sistema de Notificaciones</p>
                            </div>
                            <div class="input-field">
                                <label>Email</label>
                                <input type="email" id="login-email" value="test@test.com">
                            </div>
                            <div class="input-field">
                                <label>Contraseña</label>
                                <input type="password" id="login-password" value="123456">
                            </div>
                            <button class="btn btn-primary" onclick="loginUser()">Iniciar Sesión</button>
                        </div>
                    </div>
                    <div id="screen-home" class="screen">
                        <div><h2 style="font-size:16px; margin-bottom:10px;">Sesiones Activas</h2><div id="active-sessions-container"></div></div>
                        <button class="btn btn-secondary" onclick="showToast('Refresh realizado')" style="margin-top:auto;">🔄 Actualizar</button>
                    </div>
                    <div id="screen-notifications" class="screen"><div id="notifications-container"></div></div>
                    <div id="screen-history" class="screen"><div id="history-container"></div></div>
                    <div id="screen-profile" class="screen"><div id="profile-container"></div><button class="btn btn-danger" onclick="logout()">Cerrar Sesión</button></div>
                </div>
                <div class="tab-bar">
                    <div class="tab-item active" onclick="switchTab('home')">🏠 Home</div>
                    <div class="tab-item" onclick="switchTab('notifications')">🔔 Notif</div>
                    <div class="tab-item" onclick="switchTab('history')">📊 Historial</div>
                    <div class="tab-item" onclick="switchTab('profile')">👤 Perfil</div>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="control-title">🎮 Panel de Control</div>
            <div class="control-section">
                <span class="section-label">Backend API</span>
                <button class="control-btn control-btn-success" onclick="checkBackendStatus()">✓ Verificar Backend</button>
                <div id="backend-status"></div>
            </div>
            <div class="control-section">
                <span class="section-label">Enviar Notificaciones al Backend</span>
                <button class="control-btn control-btn-success" onclick="enviarNotificacion('⚡ Carga casi completa', '92% SOC detectado', 'R1')">🔴 R1: SOC ≥ 90%</button>
                <button class="control-btn control-btn-warning" onclick="enviarNotificacion('⏱️ Tiempo de carga bajo', 'Menos de 10 minutos', 'R2')">🟠 R2: Tiempo < 10min</button>
                <button class="control-btn control-btn-success" onclick="enviarNotificacion('✅ Cargador disponible', 'Charger CP-001 listo', 'R3')">🟢 R3: Available</button>
                <button class="control-btn control-btn-primary" onclick="enviarNotificacion('✨ Carga finalizada', 'Transacción completada', 'R4')">🔵 R4: Finishing</button>
                <button class="control-btn control-btn-danger" onclick="enviarNotificacion('❌ Error en la carga', 'Charger en estado Faulted', 'R5')">⚫ R5: Fault</button>
            </div>
            <div class="control-section">
                <span class="section-label">Event Log</span>
                <div id="ocpp-log" style="max-height:150px; overflow-y:auto; background:#f5f5f5; padding:10px; border-radius:6px;"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN - CAMBIA ESTA IP POR LA DE TU PC
        const API_URL = 'http://localhost:3000/api';
        
        let currentUser = null;
        let notifications = [];
        let sessions = [];

        function switchTab(tabName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(`screen-${tabName}`).classList.add('active');
            event.target.classList.add('active');
            if (tabName === 'home') loadActiveSessions();
            if (tabName === 'notifications') loadNotifications();
            if (tabName === 'history') loadHistory();
            if (tabName === 'profile') loadProfile();
        }

        // Función que ENVÍA la notificación al BACKEND real
        async function enviarNotificacion(title, body, rule) {
            addLog(`📤 Enviando evento ${rule}: ${title}`);
            
            try {
                const response = await fetch(`${API_URL}/notifications/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser?.id || '1',
                        title: title,
                        body: body
                    })
                });
                
                const result = await response.json();
                if (result.success) {
                    addLog(`✅ Evento ${rule} enviado correctamente al backend`);
                    // También mostrar en el simulador local
                    simulateNotification(title, body);
                } else {
                    addLog(`❌ Error enviando ${rule}: ${result.error}`);
                }
            } catch (error) {
                addLog(`❌ Error de conexión con el backend: ${error}`);
                showToast('❌ Error conectando al backend');
            }
        }

        function addLog(msg) {
            const logDiv = document.getElementById('ocpp-log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'ocpp-event';
            entry.innerHTML = `<span style="color:#999;">[${timestamp}]</span> ${msg}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
            if (logDiv.children.length > 10) logDiv.removeChild(logDiv.lastChild);
        }

        async function loginUser() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user || { id: '1', email, name: 'Demo User' };
                    showToast('✓ Login exitoso');
                    addLog(`✅ Usuario ${email} autenticado`);
                    document.getElementById('screen-login').classList.remove('active');
                    document.getElementById('screen-home').classList.add('active');
                    loadActiveSessions();
                } else {
                    showToast('❌ Credenciales inválidas');
                }
            } catch (error) {
                showToast('❌ Error conectando al backend');
                addLog('❌ Error de conexión con el backend');
            }
        }

        function simulateNotification(title, body) {
            notifications.push({ title, body, timestamp: new Date() });
            showToast(`📬 ${title}`);
            if (document.getElementById('screen-notifications').classList.contains('active')) {
                loadNotifications();
            }
        }

        function loadActiveSessions() {
            const container = document.getElementById('active-sessions-container');
            sessions = [
                { id: 1, charger: 'CP-001', soc: 85, power: 7.4, duration: '45 min' },
                { id: 2, charger: 'CP-002', soc: 45, power: 11, duration: '1 h 20 min' }
            ];
            container.innerHTML = sessions.map(s => `
                <div class="session-card">
                    <div class="session-header">Cargador ${s.charger}</div>
                    <div class="session-info">
                        <div class="session-metric"><div class="session-metric-value">${s.soc}%</div><div class="session-metric-label">SOC</div></div>
                        <div class="session-metric"><div class="session-metric-value">${s.power}kW</div><div class="session-metric-label">Potencia</div></div>
                        <div class="session-metric"><div class="session-metric-value">${s.duration}</div><div class="session-metric-label">Duración</div></div>
                    </div>
                    <button class="btn btn-danger" style="width:100%; font-size:12px;">Detener Carga</button>
                </div>
            `).join('');
        }

        function loadNotifications() {
            const container = document.getElementById('notifications-container');
            if (notifications.length === 0) {
                container.innerHTML = '<p style="color:#999; text-align:center; padding:30px;">No hay notificaciones aún</p>';
                return;
            }
            container.innerHTML = notifications.map(n => `
                <div class="notification-item">
                    <div class="notification-time">${new Date(n.timestamp).toLocaleTimeString()}</div>
                    <div class="notification-title">${n.title}</div>
                    <div class="notification-body">${n.body}</div>
                </div>
            `).reverse().join('');
        }

        function loadHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = `
                <div class="session-card"><div class="session-header">10 May 2026</div><div>Cargador CP-001 | 18.5 kWh | $3.50</div></div>
                <div class="session-card"><div class="session-header">09 May 2026</div><div>Cargador CP-005 | 22.3 kWh | $4.20</div></div>
                <div class="session-card"><div class="session-header">08 May 2026</div><div>Cargador CP-003 | 15.8 kWh | $3.00</div></div>
            `;
        }

        function loadProfile() {
            document.getElementById('profile-container').innerHTML = `
                <div class="profile-card">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-name">${currentUser?.name || 'Usuario'}</div>
                    <div class="profile-email">${currentUser?.email || 'user@email.com'}</div>
                </div>
                <div class="profile-info">
                    <div class="info-item"><div class="info-label">Sesiones Totales</div><div class="info-value">42</div></div>
                    <div class="info-item"><div class="info-label">Energía Cargada</div><div class="info-value">487.3 kWh</div></div>
                </div>
            `;
        }

        async function checkBackendStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                if (data.status === 'OK') {
                    document.getElementById('backend-status').innerHTML = '<div class="status-badge status-success">✓ Backend OPERATIONAL</div>';
                    addLog('✅ Backend conectado correctamente');
                    showToast('✓ Backend respondiendo');
                }
            } catch (error) {
                document.getElementById('backend-status').innerHTML = '<div class="status-badge status-error">✗ Backend no disponible</div>';
                addLog('❌ Backend no disponible');
                showToast('✗ Backend no responde');
            }
        }

        function logout() {
            currentUser = null;
            notifications = [];
            document.getElementById('screen-login').classList.add('active');
            document.getElementById('screen-home').classList.remove('active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab-item:first-child').classList.add('active');
            addLog('🔓 Sesión cerrada');
            showToast('Sesión cerrada');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.addEventListener('load', () => {
            console.log('✅ Demo EVCS cargado - Modo Backend Real');
            addLog('🚀 Simulador listo - Enviando eventos al backend real');
        });
    </script>
</body>
</html>
